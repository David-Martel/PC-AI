name: PowerShell Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run PowerShell lint via Build.ps1
        shell: pwsh
        run: |
          .\Build.ps1 -Component lint -LintProfile powershell
          if ($LASTEXITCODE -ne 0) { throw "Build.ps1 lint (powershell) failed with exit code $LASTEXITCODE" }

  test:
    runs-on: windows-latest
    needs: lint
    strategy:
      matrix:
        powershell: ['5.1', '7.4']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -MinimumVersion 5.6.1 -Force -Scope CurrentUser

      - name: Run Tests
        shell: pwsh
        run: |
          if (Test-Path ".\Tests\.pester.ps1") {
              .\Tests\.pester.ps1 -CI
          } else {
              Write-Warning "No Pester test runner found. Skipping tests."
          }

      - name: Run Tests with Coverage
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path Tests/TestResults -Force | Out-Null
          $config = New-PesterConfiguration -Hashtable (Import-PowerShellDataFile Tests/PesterConfiguration.psd1)
          $config.Run.Exit = $false
          $config.CodeCoverage.Enabled = $true
          $config.CodeCoverage.OutputFormat = 'JaCoCo'
          $config.CodeCoverage.OutputPath = 'Tests/TestResults/coverage.xml'
          $config.CodeCoverage.CoveragePercentTarget = 85
          $result = Invoke-Pester -Configuration $config -PassThru
          # Write coverage summary to GitHub job summary
          $coveragePct = [math]::Round($result.CodeCoverage.CoveragePercent, 2)
          $covered   = $result.CodeCoverage.CommandsExecutedCount
          $total     = $result.CodeCoverage.CommandsAnalyzedCount
          $missed    = $total - $covered
          @"
          ## PowerShell Code Coverage (PS ${{ matrix.powershell }})
          | Metric | Value |
          |--------|-------|
          | Coverage | $coveragePct% |
          | Commands covered | $covered / $total |
          | Commands missed | $missed |
          | Target | 85% |
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Upload Coverage
        if: always() && hashFiles('Tests/TestResults/coverage.xml') != ''
        uses: codecov/codecov-action@v4
        with:
          files: ./Tests/TestResults/coverage.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-coverage-${{ matrix.powershell-version }}
          path: Tests/TestResults/coverage.xml
          retention-days: 30

  integration:
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Test Module Import
        shell: pwsh
        run: |
          Get-ChildItem -Path Modules -Directory | ForEach-Object {
              $modulePath = Join-Path $_.FullName "$($_.Name).psd1"
              if (Test-Path $modulePath) {
                  Write-Host "Testing import of $($_.Name)..."
                  Import-Module $modulePath -Force -ErrorAction Stop
                  Write-Host "✓ $($_.Name) imported successfully"
              }
          }

      - name: Run Hardware Diagnostics (Dry Run)
        shell: pwsh
        run: |
          if (Test-Path ".\PC-AI.ps1") {
              # Test syntax only, don't run full diagnostics in CI
              $null = Get-Command ".\PC-AI.ps1" -Syntax
              Write-Host "✓ PC-AI.ps1 syntax valid"
          }
