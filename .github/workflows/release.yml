name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract Version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $version"

      - name: Run Tests
        shell: pwsh
        run: |
          Install-Module Pester -MinimumVersion 5.6.1 -Force -Scope CurrentUser
          if (Test-Path ".\Tests\.pester.ps1") {
              .\Tests\.pester.ps1 -CI
          }

      - name: Build Release Package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $releasePath = "PC-AI-$version"
          $releaseModuleRoot = Join-Path $PWD "Release\PowerShell\PC-AI"
          $packageModuleRoot = Join-Path $releasePath "PC-AI"

          .\Tools\New-PcaiPowerShellRelease.ps1 -ModuleVersion $version -Clean | Out-Null
          $validation = .\Tools\Test-PcaiReleaseModule.ps1 -ReleaseModulePath (Join-Path $releaseModuleRoot 'PC-AI.psd1')
          if (-not $validation.Passed) {
              throw "Release validation failed: $($validation.MissingCommands -join ', ')"
          }

          if (Test-Path $releasePath) {
              Remove-Item -LiteralPath $releasePath -Recurse -Force
          }

          New-Item -ItemType Directory -Path $releasePath -Force | Out-Null
          Copy-Item -Path $releaseModuleRoot -Destination $releasePath -Recurse -Force

          @'
          # PC-AI PowerShell module installer
          param(
              [ValidateSet('Documents', 'LocalAppData', 'OneDrive')]
              [string]$Target = 'Documents'
          )

          $SourceRoot = Split-Path -Parent $MyInvocation.MyCommand.Path
          $ModuleSource = Join-Path $SourceRoot 'PC-AI'
          if (-not (Test-Path -LiteralPath $ModuleSource)) {
              throw "Module source not found: $ModuleSource"
          }

          $modulesRoot = switch ($Target) {
              'Documents' { Join-Path $env:USERPROFILE 'Documents\PowerShell\Modules' }
              'LocalAppData' { Join-Path $env:LOCALAPPDATA 'PowerShell\Modules' }
              'OneDrive' { Join-Path $env:USERPROFILE 'OneDrive\Documents\PowerShell\Modules' }
          }
          $moduleDestination = Join-Path $modulesRoot 'PC-AI'

          New-Item -ItemType Directory -Path $modulesRoot -Force | Out-Null

          $arguments = @(
              $ModuleSource,
              $moduleDestination,
              '/MIR',
              '/R:1',
              '/W:1',
              '/NFL',
              '/NDL',
              '/NJH',
              '/NJS',
              '/NP',
              '/XJ'
          )
          & robocopy @arguments | Out-Null
          if ($LASTEXITCODE -gt 7) {
              throw "robocopy failed with exit code $LASTEXITCODE"
          }

          $manifestPath = Join-Path $moduleDestination 'PC-AI.psd1'
          Write-Host "PC-AI installed to $moduleDestination" -ForegroundColor Green
          Write-Host "Import with: Import-Module `"$manifestPath`" -Force" -ForegroundColor Cyan
          '@ | Out-File -FilePath "$releasePath\Install.ps1" -Encoding UTF8

          Compress-Archive -Path $releasePath -DestinationPath "PC-AI-$version.zip" -Force
          Write-Host "✓ Created PC-AI-$version.zip"

      - name: Generate Release Notes
        id: notes
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $notes = @"
          ## PC_AI v$version

          ### Components
          - PowerShell umbrella module: `PC-AI/PC-AI.psd1`
          - Nested component modules under `PC-AI/Modules/`
          - Runtime configuration under `PC-AI/Config/`
          - Release metadata in `PC-AI/RELEASE_INFO.json`

          ### Installation
          ```powershell
          Expand-Archive PC-AI-$version.zip -DestinationPath C:\PC-AI

          Set-Location C:\PC-AI\PC-AI-$version
          .\Install.ps1 -Target Documents
          Import-Module "$env:USERPROFILE\Documents\PowerShell\Modules\PC-AI\PC-AI.psd1" -Force
          ```

          ### Quick Start
          ```powershell
          Import-Module "$env:USERPROFILE\Documents\PowerShell\Modules\PC-AI\PC-AI.psd1" -Force
          Get-Command -Module PC-AI*
          ```

          ### System Requirements
          - Windows 10 1809+ or Windows 11
          - PowerShell 7.0+ (PowerShell 7.4+ recommended)
          - Administrator privileges for the full diagnostics surface

          ### Documentation
          See `PC-AI/README.md` and `PC-AI/RELEASE_INFO.json` for the packaged module layout and build metadata.
          "@

          # Save to file for GitHub release
          $notes | Out-File -FilePath "RELEASE_NOTES.md" -Encoding UTF8

          # Export for GitHub Actions (handle multiline)
          "RELEASE_NOTES<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $notes | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            PC-AI-${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PC-AI-${{ steps.version.outputs.VERSION }}
          path: PC-AI-${{ steps.version.outputs.VERSION }}.zip
          retention-days: 90
