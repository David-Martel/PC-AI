name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract Version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $version"

      - name: Run Tests
        shell: pwsh
        run: |
          Install-Module Pester -MinimumVersion 5.6.1 -Force -Scope CurrentUser
          if (Test-Path ".\Tests\.pester.ps1") {
              .\Tests\.pester.ps1 -CI
          }

      - name: Build Release Package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $releasePath = "PC-AI-$version"
          $docsToCopy = @(
            "README.md",
            "DIAGNOSE.md",
            "DIAGNOSE_LOGIC.md",
            "CHAT.md",
            "ARCHITECTURE.md",
            "LICENSE"
          )

          # Create release directory structure
          New-Item -ItemType Directory -Path $releasePath -Force
          New-Item -ItemType Directory -Path "$releasePath\Modules" -Force
          New-Item -ItemType Directory -Path "$releasePath\Config" -Force
          New-Item -ItemType Directory -Path "$releasePath\docs" -Force
          New-Item -ItemType Directory -Path "$releasePath\Reports" -Force

          # Copy entrypoint and runtime assets
          Copy-Item -Path "PC-AI.ps1" -Destination $releasePath -Force
          Copy-Item -Path "Modules\*" -Destination "$releasePath\Modules\" -Recurse -Force
          Copy-Item -Path "Config\*" -Destination "$releasePath\Config\" -Recurse -Force
          if (Test-Path "docs") {
            Copy-Item -Path "docs\*" -Destination "$releasePath\docs\" -Recurse -Force
          }
          foreach ($doc in $docsToCopy) {
            if (Test-Path $doc) {
              Copy-Item -Path $doc -Destination $releasePath -Force
            }
          }

          # Create install script
          @'
          # PC_AI Installation Script
          param(
              [string]$InstallPath = "$env:LOCALAPPDATA\PC-AI",
              [ValidateSet('CurrentUser', 'Machine', 'None')]
              [string]$ModulePathScope = 'CurrentUser'
          )

          $SourceRoot = Split-Path -Parent $MyInvocation.MyCommand.Path
          Write-Host "Installing PC_AI to $InstallPath..." -ForegroundColor Cyan

          # Create installation directory
          New-Item -ItemType Directory -Path $InstallPath -Force | Out-Null
          New-Item -ItemType Directory -Path "$InstallPath\Modules" -Force | Out-Null
          New-Item -ItemType Directory -Path "$InstallPath\Config" -Force | Out-Null
          New-Item -ItemType Directory -Path "$InstallPath\docs" -Force | Out-Null
          New-Item -ItemType Directory -Path "$InstallPath\Reports" -Force | Out-Null

          # Copy runtime files
          Copy-Item -Path "$SourceRoot\PC-AI.ps1" -Destination "$InstallPath\" -Force
          Copy-Item -Path "$SourceRoot\Modules\*" -Destination "$InstallPath\Modules\" -Recurse -Force
          Copy-Item -Path "$SourceRoot\Config\*" -Destination "$InstallPath\Config\" -Recurse -Force
          if (Test-Path "$SourceRoot\docs") {
              Copy-Item -Path "$SourceRoot\docs\*" -Destination "$InstallPath\docs\" -Recurse -Force
          }

          $rootDocs = @("README.md", "DIAGNOSE.md", "DIAGNOSE_LOGIC.md", "CHAT.md", "ARCHITECTURE.md", "LICENSE")
          foreach ($doc in $rootDocs) {
              $src = Join-Path $SourceRoot $doc
              if (Test-Path $src) {
                  Copy-Item -Path $src -Destination $InstallPath -Force
              }
          }

          # Add to PSModulePath if requested
          if ($ModulePathScope -ne 'None') {
              $currentPath = [Environment]::GetEnvironmentVariable("PSModulePath", $ModulePathScope)
              $modulePath = "$InstallPath\Modules"
              if ([string]::IsNullOrWhiteSpace($currentPath)) {
                  $newPath = $modulePath
              } elseif ($currentPath -notlike "*$modulePath*") {
                  $newPath = "$currentPath;$modulePath"
              } else {
                  $newPath = $currentPath
              }

              if ($newPath -ne $currentPath) {
                  [Environment]::SetEnvironmentVariable("PSModulePath", $newPath, $ModulePathScope)
                  Write-Host "✓ Added to PSModulePath ($ModulePathScope)" -ForegroundColor Green
              }
          }

          Write-Host "`n✓ PC_AI installed successfully!" -ForegroundColor Green
          Write-Host "`nTo get started, run: & `"$InstallPath\PC-AI.ps1`" help" -ForegroundColor Cyan
          '@ | Out-File -FilePath "$releasePath\Install.ps1" -Encoding UTF8

          # Create archive
          Compress-Archive -Path $releasePath -DestinationPath "PC-AI-$version.zip" -Force
          Write-Host "✓ Created PC-AI-$version.zip"

      - name: Generate Release Notes
        id: notes
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $notes = @"
          ## PC_AI v$version

          ### Components
          - Unified CLI entrypoint: `PC-AI.ps1`
          - PowerShell modules under `Modules/`
          - Runtime configuration under `Config/`
          - Documentation from `docs/` and root markdown files

          ### Installation
          ```powershell
          Expand-Archive PC-AI-$version.zip -DestinationPath C:\PC-AI

          # Run per-user installation (default)
          Set-Location C:\PC-AI\PC-AI-$version
          .\Install.ps1 -InstallPath "$env:LOCALAPPDATA\PC-AI"
          ```

          ### Quick Start
          ```powershell
          & "$env:LOCALAPPDATA\PC-AI\PC-AI.ps1" help
          & "$env:LOCALAPPDATA\PC-AI\PC-AI.ps1" diagnose all
          & "$env:LOCALAPPDATA\PC-AI\PC-AI.ps1" doctor
          ```

          ### System Requirements
          - Windows 10 1809+ or Windows 11
          - PowerShell 5.1+ (PowerShell 7.4+ recommended)
          - Administrator privileges for full diagnostics

          ### Documentation
          See `README.md`, `DIAGNOSE.md`, `DIAGNOSE_LOGIC.md`, and the `docs/` folder for usage details.
          "@

          # Save to file for GitHub release
          $notes | Out-File -FilePath "RELEASE_NOTES.md" -Encoding UTF8

          # Export for GitHub Actions (handle multiline)
          "RELEASE_NOTES<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $notes | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_NOTES.md
          files: |
            PC-AI-${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PC-AI-${{ steps.version.outputs.VERSION }}
          path: PC-AI-${{ steps.version.outputs.VERSION }}.zip
          retention-days: 90
