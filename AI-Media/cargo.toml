[package]
name = "janus-rust"
version = "0.2.0"
edition = "2024" # Upgraded to 2024 edition

[dependencies]
anyhow = "1.0"
# Candle: Ensure features match your GPU setup (cuda vs metal)
candle-core = { version = "0.9", features = ["cuda", "cudnn"] }
candle-nn = "0.9"
candle-transformers = "0.9"
candle-flash-attn = { version = "0.9", optional = true } # Optional optimization

tokenizers = "0.20"
image = "0.25"
hf-hub = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
byteorder = "1.5"

[features]
default = ["flash-attn"]
flash-attn = ["dep:candle-flash-attn"]
