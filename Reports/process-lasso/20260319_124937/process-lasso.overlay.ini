[OutOfControlProcessRestraint]
OocExclusions=audiodg.exe,bitsumsessionagent.exe,dwm.exe,explorer.exe

[ProcessAllowances]
EfficiencyMode=chrome.exe,0,brave.exe,0,pwsh.exe,0,windowsterminal.exe,0,codex.exe,0,code.exe,0,explorer.exe,0,dwm.exe,0,zoom.exe,0

[ProcessDefaults]
DefaultPriorities=nvcontainer.exe,below normal,NVDisplay.Container.exe,below normal,OneDrive.exe,below normal

[PowerManagement]
StartWithPowerPlan=Balanced
